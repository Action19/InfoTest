# Render.com Configuration for InfoTest Backend

services:
  # Backend API Service
  - type: web
    name: infotest-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm run start-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: infotest-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: infotest-db
    databaseName: infotest
    user: infotest_user
    region: singapore
    plan: free
